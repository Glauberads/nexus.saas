<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Premium | NexusSaaS Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-dashboard.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-main);
      background-image: radial-gradient(circle at 50% 0%, rgba(255, 107, 0, 0.1) 0%, transparent 50%);
    }
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 40px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
    }
    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .login-logo {
      text-align: center;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 32px;
    }
    .login-logo span { color: var(--accent); }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .form-control {
      width: 100%;
      background: var(--bg-main);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      border-color: var(--accent);
    }
    .login-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 24px;
    }
    .login-options label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .login-options a {
      color: var(--accent);
      text-decoration: none;
    }
    .login-options a:hover { text-decoration: underline; }
    
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 14px;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .btn-login:hover {
      background: #E65100;
    }
    .btn-login:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    
    .error-message {
      background: var(--danger-bg);
      color: var(--danger);
      padding: 12px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }
    .error-message.show { display: block; }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-logo">
      ⬡ Nexus<span>SaaS</span>
    </div>
    
    <div class="error-message" id="error-msg"></div>

    <form id="login-form">
      <div class="form-group">
        <label for="email">E-mail Administrativo</label>
        <input type="email" id="email" class="form-control" placeholder="suporteglauberr@gmail.com" required>
      </div>
      
      <div class="form-group">
        <label for="password">Senha de Acesso</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <div class="login-options">
        <label>
          <input type="checkbox" id="remember" checked> Lembrar sessão
        </label>
        <a href="#">Esqueceu sua senha?</a>
      </div>
      
      <button type="submit" class="btn-login" id="btn-submit">
        <span>Entrar no Dashboard</span>
      </button>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      // Check if already logged in
      if (window.supabase) {
        const { data: { session } } = await window.supabase.auth.getSession();
        if (session && session.user.email === 'suporteglauberr@gmail.com') {
          window.location.href = 'admin-dashboard.html';
        }
      }
    });

    const form = document.getElementById('login-form');
    const errorMsg = document.getElementById('error-msg');
    const btnSubmit = document.getElementById('btn-submit');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      if (email !== 'suporteglauberr@gmail.com') {
        showError('Acesso restrito. E-mail não autorizado.');
        return;
      }
      
      if (!window.supabase) {
        showError('Erro de conexão com o Supabase.');
        return;
      }
      
      try {
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = 'Autenticando...';
        
        const { data, error } = await window.supabase.auth.signInWithPassword({
          email,
          password
        });
        
        if (error) throw error;
        
        if (data.session && data.user.email === 'suporteglauberr@gmail.com') {
          window.location.href = 'admin-dashboard.html';
        } else {
          // Extra safeguard
          await window.supabase.auth.signOut();
          throw new Error('Acesso negado para este usuário.');
        }
        
      } catch (err) {
        showError(err.message || 'Credenciais inválidas.');
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = 'Entrar no Dashboard';
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add('show');
      setTimeout(() => errorMsg.classList.remove('show'), 5000);
    }
  </script>
</body>
</html>
