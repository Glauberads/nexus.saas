<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusSaaS | Pedido Recebido</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0A0A0A;
      --bg-card: #161616;
      --border: rgba(255, 255, 255, 0.08);
      --text-primary: #EDEDED;
      --text-secondary: #A1A1AA;
      --accent: #8B5CF6;
      --success: #22C55E;
      --warning: #F59E0B;
      --font-sans: 'Plus Jakarta Sans', 'Inter', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .icon-success {
      width: 80px; height: 80px; background: rgba(34, 197, 94, 0.1); color: var(--success);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 24px auto;
    }
    .icon-pending {
      width: 80px; height: 80px; background: rgba(245, 158, 11, 0.1); color: var(--warning);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 40px; margin: 0 auto 24px auto;
    }

    h1 { font-size: 24px; font-weight: 800; margin-bottom: 16px; }
    p { font-size: 15px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px; }

    .btn-primary {
      display: inline-block; padding: 16px 32px; background: var(--accent); color: white;
      text-decoration: none; font-weight: 700; border-radius: 8px; font-size: 16px; transition: 0.2s;
    }
    .btn-primary:hover { background: #7C3AED; transform: translateY(-2px); }

    .next-steps {
      text-align: left; background: rgba(255,255,255,0.02); padding: 24px;
      border-radius: 12px; border: 1px solid var(--border); margin-bottom: 32px;
    }
    .next-steps h3 { font-size: 14px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 16px; }
    .next-steps ul { list-style: none; }
    .next-steps li { display: flex; gap: 12px; margin-bottom: 12px; font-size: 14px; color: var(--text-secondary); }
    .next-steps li:last-child { margin-bottom: 0; }
  </style>
</head>
<body>

  <div class="card" id="status-card">
    <div style="color: var(--text-muted); margin-bottom: 24px;">Carregando status do pedido...</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const status = urlParams.get('status');
    const card = document.getElementById('status-card');

    if (status === 'paid') {
      card.innerHTML = `
        <div class="icon-success">✓</div>
        <h1>Pagamento Aprovado!</h1>
        <p>Seu pagamento foi confirmado com sucesso. Você já tem acesso ao sistema e todos os materiais liberados.</p>
        
        <div class="next-steps">
          <h3>Próximos Passos:</h3>
          <ul>
            <li><span>1.</span> Enviamos as instruções de acesso para o seu e-mail.</li>
            <li><span>2.</span> Clique no botão abaixo para acessar a Área de Membros.</li>
            <li><span>3.</span> Caso seja seu primeiro acesso, use a opção "Esqueci minha senha" usando o e-mail da compra.</li>
          </ul>
        </div>

        <a href="cliente-login.html" class="btn-primary">Acessar Área de Membros</a>
      `;
    } else {
      card.innerHTML = `
        <div class="icon-pending">⏳</div>
        <h1>Pedido Recebido!</h1>
        <p>Recebemos o seu pedido. Estamos aguardando a compensação do seu pagamento.</p>
        
        <div class="next-steps">
          <h3>Atenção:</h3>
          <ul>
            <li><span>•</span> Se você pagou via <b>PIX</b>, a liberação costuma ocorrer em até 5 minutos.</li>
            <li><span>•</span> Se foi via <b>Boleto Bancário</b>, a compensação leva de 1 a 3 dias úteis.</li>
            <li><span>•</span> Assim que o pagamento for aprovado, você receberá um e-mail com os dados de acesso imediato.</li>
          </ul>
        </div>
      `;
    }
  </script>
</body>
</html>
