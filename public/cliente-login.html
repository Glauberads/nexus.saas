<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusSaaS | Portal do Cliente</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #0A0A0A;
      --bg-card: #121214;
      --border: rgba(255, 255, 255, 0.08);
      --border-focus: rgba(139, 92, 246, 0.3);
      --text-primary: #EDEDED;
      --text-secondary: #A1A1AA;
      --text-muted: #71717A;
      --accent: #8B5CF6; /* Purple for members area */
      --accent-glow: rgba(139, 92, 246, 0.15);
      --danger: #EF4444;
      --font-sans: 'Plus Jakarta Sans', sans-serif;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-main);
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
    }

    /* Background Glow */
    .glow-blob {
      position: absolute;
      width: 400px;
      height: 400px;
      background: var(--accent);
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      top: -100px;
      left: -100px;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      z-index: 1;
      position: relative;
      backdrop-filter: blur(20px);
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      color: var(--text-primary);
      text-align: center;
      margin-bottom: 8px;
      letter-spacing: -0.03em;
    }
    .logo span { color: var(--accent); }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 32px;
    }

    .input-group {
      margin-bottom: 20px;
    }
    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }
    .input-group input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: all 0.2s ease;
    }
    .input-group input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: 0.2s;
      margin-top: 8px;
    }
    .btn-login:hover { background: #7c3aed; }
    .btn-login:disabled { opacity: 0.7; cursor: not-allowed; }

    .forgot-password {
      display: block;
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-secondary);
      text-decoration: none;
      transition: 0.2s;
    }
    .forgot-password:hover { color: var(--text-primary); }

    .error-msg {
      color: var(--danger);
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

  </style>
  <script src="env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

  <div class="glow-blob"></div>

  <div class="login-container">
    <div class="logo">⬡ Nexus<span>SaaS</span></div>
    <div class="subtitle">Portal Exclusivo para Clientes</div>

    <div class="error-msg" id="error-msg"></div>

    <form id="login-form">
      <div class="input-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="Seu e-mail de compra" required>
      </div>
      <div class="input-group">
        <label for="password">Senha</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-login" id="btn-submit">Entrar no Portal</button>
    </form>

    <a href="#" class="forgot-password" onclick="alert('Funcionalidade de Redefinição de Senha em breve!'); return false;">Esqueceu sua senha?</a>
  </div>

  <script>
    // Recupera configurações do NexusTracker (para pegar o Supabase Auth info)
    let supabaseClient = null;
    
    document.addEventListener('DOMContentLoaded', () => {
      // Configurar Supabase do Tracker já embutido no index ou via globals
      if (window.NexusTracker && window.NexusTracker.config) {
        const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.NexusTracker.config;
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      } else {
        // Se o tracker script não estiver nesta página, precisamos injetar hardcoded,
        // Mas como é o portal do cliente, ele provavelmente rodará no mesmo domínio e podemos usar variáveis de ambiente
        // Como o usuário testará localmente, vamos puxar as keys do arquivo tracker local
        const script = document.createElement('script');
        script.src = 'nexus-tracker.js';
        script.onload = () => {
          const { SUPABASE_URL, SUPABASE_ANON_KEY } = window.NexusTracker.config;
          supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        };
        document.head.appendChild(script);
      }
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!supabaseClient) return;

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btn-submit');
      const err = document.getElementById('error-msg');

      btn.disabled = true;
      btn.textContent = 'Autenticando...';
      err.style.display = 'none';

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        err.textContent = "Credenciais inválidas. Verifique seu e-mail e senha.";
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar no Portal';
      } else {
        window.location.href = 'cliente-dashboard.html';
      }
    });
  </script>
</body>
</html>
