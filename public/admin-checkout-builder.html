<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>NexusSaaS | Checkout Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin-dashboard.css">
  <script src="env.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background-color: var(--bg-main);
      color: var(--text-primary);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    
    .builder-topbar {
      height: 60px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      z-index: 20;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .builder-main {
      display: flex;
      flex: 1;
      height: calc(100vh - 60px);
    }

    .builder-sidebar {
      width: 360px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }
    
    .builder-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .builder-header h2 {
      font-size: 16px;
      margin: 0;
      color: var(--accent);
    }
    
    .builder-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .builder-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
    }
    
    .btn-topbar {
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s;
    }
    .btn-topbar:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .btn-publish {
      background: var(--accent);
      color: #000;
      border: none;
    }
    .btn-publish:hover { background: var(--accent-hover); }

    .btn-back {
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
    }
    
    .preview-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }

    .preview-header {
      height: 60px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg-card);
    }
    
    .device-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    .device-btn.active {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(255, 107, 0, 0.1);
    }
    
    .iframe-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }
    
    iframe {
      width: 100%;
      height: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: white;
      transition: width 0.3s ease;
    }

    .iframe-desktop { max-width: 1440px; }
    .iframe-tablet { max-width: 768px; }
    .iframe-mobile { max-width: 390px; }

    /* Forms */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 700;
    }
    .form-control {
      width: 100%;
      padding: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: white;
      font-family: 'Inter', sans-serif;
    }
    
    .color-picker-wrapper { display: flex; align-items: center; gap: 12px; }
    .color-picker {
      width: 40px;
      height: 40px;
      padding: 0;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 14px;
      color: white;
    }
    .checkbox-label input { width: 18px; height: 18px; }

    /* Tabs */
    .builder-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .builder-tab {
      flex: 1;
      padding: 12px 0;
      text-align: center;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
    }
    .builder-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* Modals */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-content {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 600px; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
    .history-item { padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
    .history-item.published { border-color: var(--success); background: rgba(34,197,94,0.05); }
    .history-item.draft { border-color: var(--accent); background: rgba(255,107,0,0.05); }
    
    .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .template-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; }
    .template-card:hover { border-color: var(--accent); }
    
    .badge { padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
    .badge-draft { background: rgba(255,107,0,0.2); color: var(--accent); }
    .badge-published { background: rgba(34,197,94,0.2); color: var(--success); }
    .badge-archived { background: rgba(255,255,255,0.1); color: var(--text-muted); }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="builder-topbar">
    <div class="topbar-left">
      <button class="btn-back" onclick="window.location.href='admin-dashboard.html'">← Voltar</button>
      <div>
        <h2 style="font-size: 16px; margin: 0; display: flex; align-items: center; gap: 8px;">
          ⬡ Checkout Builder
          <span id="current-version-badge" class="badge badge-published">Carregando...</span>
        </h2>
        <div style="font-size: 11px; color: var(--text-muted);" id="save-status">Sem alterações pendentes</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="btn-topbar" onclick="openTemplatesModal()">🎨 Templates</button>
      <button class="btn-topbar" onclick="openHistoryModal()">🕒 Histórico</button>
      <div style="width: 1px; height: 24px; background: var(--border); margin: 0 8px;"></div>
      <button class="btn-topbar" id="btn-save-draft" onclick="saveDraft()">Salvar Rascunho</button>
      <button class="btn-topbar btn-publish" id="btn-publish" onclick="publishDraft()">🚀 Publicar</button>
    </div>
  </div>

  <div class="builder-main">
    <div class="builder-sidebar">
      <div class="builder-tabs">
      <div class="builder-tab active" data-tab="visual">Visuais</div>
      <div class="builder-tab" data-tab="content">Conteúdo</div>
      <div class="builder-tab" data-tab="conversion">Gatilhos</div>
    </div>

    <div class="builder-content">
      <!-- Aba Visual -->
      <div id="tab-visual" class="tab-pane active">
        <div class="form-group">
          <label>Cor Principal (Accent)</label>
          <div class="color-picker-wrapper">
            <input type="color" id="b-theme-color" class="color-picker" value="#FF6B00">
            <input type="text" id="b-theme-color-hex" class="form-control" value="#FF6B00" style="flex:1">
          </div>
        </div>
      </div>

      <!-- Aba Conteúdo -->
      <div id="tab-content" class="tab-pane">
        <div class="form-group">
          <label>Texto do Botão de Pagamento</label>
          <input type="text" id="b-button-text" class="form-control" value="⚡ QUERO MEU ACESSO AGORA">
        </div>
        
        <div class="form-group">
          <label>Título da Garantia</label>
          <input type="text" id="b-guarantee-title" class="form-control" value="Garantia de 7 Dias">
        </div>
        
        <div class="form-group">
          <label>Lista de Benefícios (Um por linha)</label>
          <textarea id="b-benefits-list" class="form-control" rows="6">Acesso imediato e vitalício
Código-fonte incluso
Licença white label
Atualizações Inclusas
Suporte premium</textarea>
        </div>
      </div>

      <!-- Aba Conversão -->
      <div id="tab-conversion" class="tab-pane">
        <div class="form-group" style="background: rgba(255,255,255,0.02); padding: 16px; border-radius: 8px; border: 1px solid var(--border);">
          <label class="checkbox-label">
            <input type="checkbox" id="b-timer-enabled" checked>
            Habilitar Cronômetro de Escassez
          </label>
          <div style="margin-top: 12px; padding-left: 26px;">
            <label style="font-size: 11px;">Tempo em Minutos</label>
            <input type="number" id="b-timer-minutes" class="form-control" value="15" min="1" style="width: 80px;">
          </div>
        </div>

        <div class="form-group" style="background: rgba(255,255,255,0.02); padding: 16px; border-radius: 8px; border: 1px solid var(--border);">
          <label class="checkbox-label">
            <input type="checkbox" id="b-social-proof-enabled" checked>
            Habilitar Prova Social (Avaliações)
          </label>
        </div>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-header">
      <button class="device-btn active" data-device="desktop">Desktop</button>
      <button class="device-btn" data-device="tablet">Tablet</button>
      <button class="device-btn" data-device="mobile">Mobile</button>
      <span style="position: absolute; right: 20px; background: rgba(255,0,0,0.2); color: #ef4444; padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; border: 1px solid rgba(255,0,0,0.5);">MODO PREVIEW</span>
    </div>
    <div class="iframe-container">
      <iframe id="checkout-preview-frame" class="iframe-desktop" src=""></iframe>
    </div>
  </div>
  </div> <!-- /builder-main -->

  <!-- Modal History -->
  <div id="modal-history" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 style="margin: 0; font-size: 16px;">Histórico de Versões</h3>
        <button onclick="document.getElementById('modal-history').style.display='none'" style="background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 20px;">×</button>
      </div>
      <div class="modal-body" id="history-list">
        <!-- Injetado via JS -->
      </div>
    </div>
  </div>

  <!-- Modal Templates -->
  <div id="modal-templates" class="modal-overlay">
    <div class="modal-content" style="max-width: 800px;">
      <div class="modal-header">
        <h3 style="margin: 0; font-size: 16px;">Biblioteca de Templates</h3>
        <button onclick="document.getElementById('modal-templates').style.display='none'" style="background: none; border: none; color: var(--text-primary); cursor: pointer; font-size: 20px;">×</button>
      </div>
      <div class="modal-body">
        <div class="template-grid" id="templates-list">
          <!-- Injetado via JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Carrega a config de banco de dados e tracking config -->
  <script src="env.js"></script>
  <script src="tracking.js"></script>
  <script src="admin-checkout-builder.js"></script>
</body>
</html>
